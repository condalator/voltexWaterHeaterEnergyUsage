name: Daily Energy Usage

on:
  schedule:
    # 10:00 UTC daily. Adjust as needed.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poller
        env:
          AOSMITH_EMAIL: ${{ secrets.AOSMITH_EMAIL }}
          AOSMITH_PASSWORD: ${{ secrets.AOSMITH_PASSWORD }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python energyusage.py

      - name: Commit updated CSV
        run: |
          if [[ -n "$(git status --porcelain aosmith_daily_usage.csv)" ]]; then
            MSG=$(cat commit_msg.txt 2>/dev/null || echo "Update usage data")
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add aosmith_daily_usage.csv
            git commit -m "$MSG"
            git push
          else
            echo "No CSV change to commit."
          fi
